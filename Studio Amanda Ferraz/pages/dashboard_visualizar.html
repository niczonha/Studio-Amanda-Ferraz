<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
     <link rel="stylesheet" href="./../css/dashboard.css">
    <title>Dashboard</title>
</head>
<body>
        <div class="container-dashboard">
            <button class="btn-menu" onclick="toggleMenu()">
    <span id="icone-menu">☰</span>
</button>
            <div class="menu-dashboard">
                <div class="container-logo-menu">
                    <img src="img/logo-menu-dashboard.png" alt="logo" id="imagem-logo-menu">
                </div>
                <div class="icon-pessoa-menu">
                    <img src="img/pessoa.png" alt="icon pessoa">
                    <p>Amanda e Eduarda</p>
                </div>
                <div class="links-menu-dashboard">
                    <li><img src="img/casa.png" alt="casa"><a href="dashboard.html" target="_blank">Dashboard</a></li>
                    <li><img src="img/editar.png" alt="casa"><a href="dashboard_gerenciar.html" target="_blank">Gerenciar serviços</a></li>
                    <li><img src="img/galeria.png" alt="casa"><a href="dashboard_visualizar.html ">Visualizar serviços</a></li>
                    <li><img src="img/sair.png" alt="casa"><a href="#">Sair</a></li>
                </div>
            </div>

            

            <script>
            function toggleMenu() {
                const menu = document.querySelector('.menu-dashboard');
                const icone = document.getElementById('icone-menu');

                menu.classList.toggle('ativo');

                if (menu.classList.contains('ativo')) {
                    icone.innerHTML = '✖'; // vira X
                } else {
                    icone.innerHTML = '☰'; // volta hambúrguer
                }
            }
        </script>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
</body>
</html>
