<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link rel="stylesheet" href="./../css/dashboard.css">
    <title>Dashboard</title>
</head>
<body>
        <div class="container-dashboard">
            <button class="btn-menu" onclick="toggleMenu()">
    <span id="icone-menu">☰</span>
</button>
            <div class="menu-dashboard">
                <div class="container-logo-menu">
                    <img src="../img/logo-menu-dashboard.png" alt="logo" id="imagem-logo-menu">
                </div>
                <div class="icon-pessoa-menu">
                    <img src="../img/pessoa.png" alt="icon pessoa">
                    <p>Amanda e Eduarda</p>
                </div>
                <div class="links-menu-dashboard">
                    <li><img src="../img/casa.png" alt="casa"><a href="dashboard.html" target="_blank">Dashboard</a></li>
                    <li><img src="../img/editar.png" alt="casa"><a href="dashboard_gerenciar.html" >Gerenciar serviços</a></li>
                    <li><img src="../img/galeria.png" alt="casa"><a href="dashboard_visualizar.html" target="_blank">Visualizar serviços</a></li>
                    <li><img src="../img/sair.png" alt="casa"><a href="#">Sair</a></li>
                </div>
            </div>
            

            <div class="adc_servico">
                 <p>Adicionar serviços</p>
                <div class="divisao-form">
                    <div class="formulario_adicionar">
                    <form action="">
                    <label for="nome">Título do serviço:</label>
                    <input type="text" id="titulo" name="titulo" placeholder="Ex: Progressiva sem formol" required>
                    <label for="nome">Descrição do serviço:</label>
                    <input type="text" id="titulo" name="descricao"  class="titulo">
               
                </div>
                <div class="inserir_img">
                    <img src="../img/fotos.png" alt="foto">
                    <label for="foto" class="custom-file">
                        Inserir imagem
                    </label>
                   
                     <input type="file" id="foto" name="foto" accept="image/*" required hidden>
                      <h6 id="nome-arquivo">Nenhum arquivo escolhido</h6>
                </div>
                </div>
               
                <div class="btn_enviar">
                   <button type="button" class="btn-submit" onclick="abrirPreview()">Adicionar</button>
                </div>

                     
                    </form>
                
            </div>

        <dialog id="modal-preview" class="modal-conteudo">
            <h2>Pré-visualização</h2>
            
            <p><strong>Título do serviço:</strong></p>
            <p id="preview-titulo"></p>

            <p><strong>Descrição do serviço:</strong></p>
            <p id="preview-descricao"></p>

            <p><strong>Imagem:</strong></p>
            <p id="preview-imagem"></p>

            <button class="btn-submit" onclick="this.closest('dialog').close()">Enviar</button>
        </dialog>


        </div>
       <script>
            function toggleMenu() {
                const menu = document.querySelector('.menu-dashboard');
                const icone = document.getElementById('icone-menu');

                menu.classList.toggle('ativo');

                if (menu.classList.contains('ativo')) {
                    icone.innerHTML = '✖'; // vira X
                } else {
                    icone.innerHTML = '☰'; // volta hambúrguer
                }
            }
        </script>
        <script>
document.getElementById("foto").addEventListener("change", function() {
    const nome = this.files[0]?.name || "Nenhum arquivo escolhido";
    document.getElementById("nome-arquivo").textContent = nome;
});

</script>
    <script>
  function abrirPreview() {
    const titulo = document.getElementById("titulo").value;
    const descricao = document.querySelector(".titulo").value; // Verifique se essa classe está correta no seu HTML
    const imagem = document.getElementById("foto").files[0];

    document.getElementById("preview-titulo").textContent = titulo;
    document.getElementById("preview-descricao").textContent = descricao;
    document.getElementById("preview-imagem").textContent = imagem ? imagem.name : "Nenhuma imagem";

    // MUDANÇA AQUI: Em vez de .style.display, use .showModal()
    const modal = document.getElementById("modal-preview");
    modal.showModal();
}

function fecharModal() {
    // MUDANÇA AQUI: Em vez de .style.display, use .close()
    const modal = document.getElementById("modal-preview");
    modal.close();
}

</script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
</body>
</html>
