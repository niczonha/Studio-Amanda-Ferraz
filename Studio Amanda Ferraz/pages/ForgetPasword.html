<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forget Password</title>
       <link rel="stylesheet" href="./../css/ForgetPassword.css">
</head>
<body>
    <div class="Main">
        <div class="image"><img src="../img/homem.png" alt="Forget-Password-img"></div>
        <div class="info">
            <div class="text">
                <p>Esqueceu a Senha?</p>
                <p>Digite seu e-mail para receber um link de redefinição de senha.</p>
            </div>

            <div class="dados">
                <input type="email" id="email" placeholder="Email">
                <p id="erro" style="color: red; font-size: 0.85rem; display: none;"></p>
            </div>

            <div class="btn">
                <button type="submit" onclick="sendEmail()">Enviar</button> <!--talvez de para criar uma function para enviar e verificar o email-->
                <button><a href="../pages/login.html">Cancelar</a></button>
            </div>
        </div>

    </div>
    <script src="../js/forgetPassword.js"></script>
</body>
</html>
